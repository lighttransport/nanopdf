<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nanopdf WASM Demo</title>
</head>
<body>
  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading WASM module...</div>
  </div>

  <!-- Drag-drop overlay -->
  <div class="drop-overlay" id="drop-overlay">
    <div class="drop-overlay-text">Drop PDF file here</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <h1>nanopdf</h1>
    <div class="toolbar-separator"></div>
    <button type="button" id="open-pdf-btn" title="Open a PDF file">Open PDF</button>
    <button type="button" id="open-url-btn" title="Open a PDF from a URL">Open URL</button>
    <button type="button" id="combine-btn" disabled title="Append other PDF files to this document">Combine</button>
    <input type="file" id="pdf-input" class="visually-hidden" accept=".pdf" tabindex="-1" aria-hidden="true" />
    <input type="file" id="combine-input" class="visually-hidden" accept=".pdf" multiple tabindex="-1" aria-hidden="true" />
    <div class="toolbar-separator"></div>
    <div class="page-nav">
      <button id="prev-btn" disabled title="Previous page (Left arrow)">&larr;</button>
      <span id="page-display" class="page-display" title="Click to jump to page">Page 0 / 0</span>
      <button id="next-btn" disabled title="Next page (Right arrow)">&rarr;</button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="zoom-controls">
      <button id="zoom-out-btn" disabled title="Zoom out (Ctrl+-)">&#x2212;</button>
      <span id="zoom-display" class="zoom-display" title="Current zoom level">100%</span>
      <button id="zoom-in-btn" disabled title="Zoom in (Ctrl++)">+</button>
    </div>
    <button id="fit-mode-btn" disabled title="Toggle fit mode">Fit Width</button>
    <button id="rotate-btn" disabled title="Rotate clockwise (R)">Rotate</button>
    <div class="toolbar-separator"></div>
    <button id="sidebar-toggle-btn" disabled title="Toggle sidebar">Outline</button>
    <button id="extract-btn" disabled title="Extract text from current page">Text</button>
    <button id="render-btn" disabled title="Re-render current page">Render</button>
    <button id="backend-toggle-btn" class="backend-toggle" disabled title="Switch rendering backend">Backend</button>
    <button id="export-btn" disabled title="Export selected pages as PDF">Export</button>
    <button id="extract-pages-btn" disabled title="Extract selected pages into a new PDF (preserves vector content)">Extract</button>
    <button id="organize-btn" disabled title="Reorder, rotate, or delete pages">Organize</button>
    <label class="protect-toggle" title="Password-protect exported PDF">
      <input type="checkbox" id="protect-export" disabled />
      Protect
    </label>
    <input type="password" id="export-password" class="export-password" placeholder="Password" disabled />
    <input type="password" id="export-owner-password" class="export-password" placeholder="Owner" disabled />

    <div class="toolbar-separator"></div>

    <!-- Annotation tools (macOS Preview-like) -->
    <div class="annot-tools" id="annot-tools">
      <button class="annot-tool active" data-tool="select" disabled title="Select / move / delete (V)">Select</button>
      <button class="annot-tool" data-tool="highlight" disabled title="Highlight a rectangle">Highlight</button>
      <button class="annot-tool" data-tool="text" disabled title="Add a text box">Text</button>
      <button class="annot-tool" data-tool="rect" disabled title="Draw a rectangle">Rect</button>
      <button class="annot-tool" data-tool="oval" disabled title="Draw an oval">Oval</button>
      <button class="annot-tool" data-tool="line" disabled title="Draw a line">Line</button>
      <button class="annot-tool" data-tool="arrow" disabled title="Draw an arrow">Arrow</button>
      <button class="annot-tool" data-tool="ink" disabled title="Freehand sketch">Draw</button>
      <input type="color" id="annot-color" class="annot-color" value="#ffd54a" disabled title="Annotation color" />
      <label class="annot-fill" title="Fill shapes"><input type="checkbox" id="annot-fill" disabled />Fill</label>
      <button id="annot-delete" disabled title="Delete selected annotation (Delete)">Del</button>
      <button id="save-annot-btn" disabled title="Save the whole document with annotations baked in (flattened)">Save</button>
      <button id="save-form-btn" disabled title="Save filled text fields as an editable PDF (incremental update). Use Save for checkbox/dropdown values.">Save Form</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search text..." disabled />
      <button id="search-prev-btn" disabled title="Previous match">&uarr;</button>
      <button id="search-next-btn" disabled title="Next match">&darr;</button>
      <span id="search-info" class="search-info"></span>
    </div>

    <!-- Source repository -->
    <a class="github-link" href="https://github.com/lighttransport/nanopdf"
       target="_blank" rel="noopener noreferrer"
       title="nanopdf source on GitHub">GitHub &#8599;</a>
  </div>

  <!-- Main content -->
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar hidden" id="sidebar">
      <div class="sidebar-tabs">
        <button class="active" data-tab="outline">Outline</button>
        <button data-tab="thumbs">Thumbs</button>
        <button data-tab="signatures">Signatures</button>
        <button data-tab="history">History</button>
        <button data-tab="files">Files</button>
        <button data-tab="info">Info</button>
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <!-- Filled dynamically -->
      </div>
    </div>

    <!-- Canvas area -->
    <div class="canvas-area">
      <div class="canvas-scroll" id="canvas-scroll">
        <div class="empty-state" id="empty-state">
          <div class="icon">PDF</div>
          <div>No PDF loaded</div>
          <div class="hint">Click "Open PDF" or drag and drop a file</div>
        </div>
        <div class="canvas-wrapper" id="canvas-wrapper">
          <canvas id="pdf-canvas"></canvas>
          <div id="text-overlay" class="text-overlay" aria-hidden="true"></div>
          <div id="annot-layer" class="annot-layer">
            <svg id="annot-svg" class="annot-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div id="annot-html" class="annot-html"></div>
          </div>
          <!-- Floating text-markup popover (shown when text is selected) -->
          <div id="markup-popover" class="markup-popover hidden">
            <button data-markup="highlight" title="Highlight selected text">Highlight</button>
            <button data-markup="underline" title="Underline selected text">Underline</button>
            <button data-markup="strike" title="Strikethrough selected text">Strike</button>
            <button data-markup="squiggly" title="Squiggly underline">Squiggly</button>
          </div>
        </div>
      </div>

      <!-- Text extraction panel -->
      <div class="text-panel" id="text-panel">
        <div class="text-panel-header">
          <span>Extracted Text</span>
          <button id="text-panel-close" title="Close">&times;</button>
        </div>
        <div class="text-panel-content" id="text-content"></div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">
    <span id="status-text">Initializing...</span>
    <span id="status-right"></span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
